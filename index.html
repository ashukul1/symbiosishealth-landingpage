<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Symbiosis Health</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background-color: #ffffff;
      color: #333;
      text-align: center;
    }

    .container {
      padding: 60px 20px 40px;
    }

    .logo {
      width: 180px;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 48px;
      letter-spacing: 8px;
      color: #d81b7d;
      margin: 10px 0;
    }

    .subtitle {
      letter-spacing: 6px;
      font-size: 14px;
      margin-bottom: 10px;
    }

    .tagline {
      font-size: 16px;
      color: #777;
      margin-bottom: 40px;
    }

    form {
      margin-top: 20px;
    }

    input[type="email"] {
      padding: 14px;
      width: 260px;
      border: 1px solid #ddd;
      border-radius: 6px;
      margin-right: 10px;
      font-size: 14px;
    }

    button {
      padding: 14px 22px;
      background-color: #d81b7d;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
    }

    button:hover {
      background-color: #b9166b;
    }

    /* LOGO BAR */

    .logo-bar {
      margin-top: 80px;
      padding: 40px 20px;
      background-color: #f9f9fb;
    }

    .logo-text {
      font-size: 13px;
      color: #6b6b6b;
      margin-bottom: 25px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }

    .logo-container {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 50px;
      flex-wrap: wrap;
    }

    .logo-container img {
      height: 38px;
      opacity: 0.7;
      filter: grayscale(100%);
      transition: all 0.3s ease;
    }

    .logo-container img:hover {
      opacity: 1;
      filter: grayscale(0%);
      transform: scale(1.08);
    }

    footer {
      margin-top: 60px;
      font-size: 12px;
      color: #aaa;
    }

  </style>
</head>

<body>

  <div class="container">
    
    <!-- LOGO -->
    <img src="symbiosis_health_logo_barbie.png" class="logo" alt="Symbiosis Health Logo">

    <!-- TEXT -->
    <h1>Symbiosis</h1>
    <div class="subtitle">HEALTH</div>
    <div class="tagline">preventive care built for you</div>

    <!-- WAITLIST FORM -->
    <form action="https://formspree.io/f/mdapnrdg" method="POST">
      <input type="email" name="email" placeholder="Enter your email" required>
      <button type="submit">Join Waitlist</button>
    </form>

  </div>

  <!-- CREDIBILITY BAR -->
  <section class="logo-bar">
    <p class="logo-text">Built by professionals from</p>
    <div class="logo-container">
      <img src="bu.png" alt="Boston University">
      <img src="nyu.png" alt="NYU">
      <img src="harvard.png" alt="Harvard">
      <img src="rutgers.png" alt="Rutgers">
    </div>
  </section>

  <footer>
    © 2026 Symbiosis Health
  </footer>

</body>
</html>
